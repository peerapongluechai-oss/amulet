<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจัดการบัญชีร้านพระ Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .zoom-in { animation: zoomIn 0.2s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        /* Modal Backdrop */
        #modalBackdrop.hidden { display: none; }
        #modalBackdrop { display: flex; }
    </style>
</head>
<body class="min-h-screen flex justify-center text-slate-800">

    <div class="w-full max-w-md bg-slate-50 min-h-screen relative shadow-2xl flex flex-col overflow-hidden">
        
        <!-- Header -->
        <header class="bg-slate-900 text-white px-6 py-6 pb-24 rounded-b-[40px] shadow-sm relative z-0">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-slate-400 text-sm font-medium mb-1">สวัสดี, ร้านพระของคุณ</p>
                    <h1 class="text-2xl font-bold flex items-center gap-2">
                        <i class="ph-fill ph-medal text-amber-400 text-2xl"></i> บัญชีร้านพระ
                    </h1>
                </div>
                <label class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-full cursor-pointer transition-colors border border-slate-700">
                    <i class="ph ph-calendar-blank text-amber-400"></i>
                    <input type="date" id="datePicker" class="bg-transparent text-sm font-medium outline-none [&::-webkit-calendar-picker-indicator]:hidden w-24 text-white">
                </label>
            </div>
        </header>

        <div class="px-5 -mt-20 relative z-10 space-y-4">
            <!-- Total Assets -->
            <div class="bg-gradient-to-br from-amber-500 to-orange-600 p-6 rounded-3xl shadow-xl text-white relative overflow-hidden">
                <i class="ph ph-coins text-8xl absolute -right-4 -bottom-4 opacity-20 transform -rotate-12"></i>
                <div class="flex justify-between items-start mb-4 relative z-10">
                    <p class="text-amber-100 font-medium flex items-center gap-2">
                        <i class="ph ph-chart-line-up"></i> ทรัพย์สินรวมสุทธิ
                    </p>
                    <div class="p-2 bg-white/20 rounded-xl backdrop-blur-sm"><i class="ph ph-chart-pie-slice text-xl"></i></div>
                </div>
                <h2 class="text-4xl font-extrabold tracking-tight mb-6 relative z-10" id="totalBalance">0 ฿</h2>
                
                <div class="grid grid-cols-2 gap-4 border-t border-white/20 pt-4 relative z-10">
                    <div>
                        <p class="text-amber-100 text-xs mb-1 flex items-center gap-1"><i class="ph ph-bank"></i> เงินโอน</p>
                        <p class="font-semibold text-lg" id="transferBalance">0 ฿</p>
                    </div>
                    <div>
                        <p class="text-amber-100 text-xs mb-1 flex items-center gap-1"><i class="ph ph-wallet"></i> เงินสด</p>
                        <p class="font-semibold text-lg" id="cashBalance">0 ฿</p>
                    </div>
                </div>
            </div>

            <!-- Daily P&L -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-3">
                    <div class="bg-emerald-100 p-3 rounded-full text-emerald-600"><i class="ph ph-trend-up text-xl"></i></div>
                    <div>
                        <p class="text-xs text-slate-500 font-medium">ขายวันนี้</p>
                        <p class="font-bold text-emerald-600 text-lg" id="dailyIncome">0 ฿</p>
                    </div>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-3">
                    <div class="bg-rose-100 p-3 rounded-full text-rose-600"><i class="ph ph-trend-down text-xl"></i></div>
                    <div>
                        <p class="text-xs text-slate-500 font-medium">ซื้อเข้าวันนี้</p>
                        <p class="font-bold text-rose-600 text-lg" id="dailyExpense">0 ฿</p>
                    </div>
                </div>
            </div>
        </div>

        <main class="flex-1 px-5 mt-6 pb-28 overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-end mb-4">
                <h3 class="text-lg font-bold text-slate-800">รายการประจำวัน</h3>
                <span class="text-xs font-semibold bg-slate-200 text-slate-600 px-2 py-1 rounded-md" id="dailyCount">0 รายการ</span>
            </div>
            
            <!-- List Container -->
            <div id="transactionList" class="space-y-3 pb-4">
                <!-- Rendered via JS -->
            </div>
        </main>

        <!-- FAB -->
        <div class="fixed bottom-6 w-full max-w-md px-6 flex justify-center z-40 pointer-events-none">
            <button onclick="toggleModal(true)" class="pointer-events-auto bg-slate-900 hover:bg-slate-800 text-white rounded-full h-16 w-16 flex items-center justify-center shadow-[0_8px_30px_rgb(0,0,0,0.3)] active:scale-90 transition-transform group border-4 border-slate-50">
                <i class="ph ph-plus text-3xl group-hover:rotate-90 transition-transform duration-300"></i>
            </button>
        </div>

        <!-- Fade Bottom -->
        <div class="fixed bottom-0 w-full max-w-md h-24 bg-gradient-to-t from-slate-50 to-transparent pointer-events-none z-30"></div>

        <!-- Modal -->
        <div id="modalBackdrop" class="fixed inset-0 z-50 items-end sm:items-center justify-center bg-slate-900/40 backdrop-blur-sm p-0 sm:p-4 hidden fade-in">
            <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] slide-up">
                
                <div class="flex justify-between items-center p-5 border-b border-slate-100">
                    <h2 class="text-xl font-bold text-slate-800">บันทึกรายการใหม่</h2>
                    <button onclick="toggleModal(false)" class="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-slate-200 transition-colors">
                        <i class="ph ph-x text-lg"></i>
                    </button>
                </div>

                <form id="addForm" class="p-5 overflow-y-auto space-y-6">
                    <!-- Category Selector -->
                    <div>
                        <label class="text-sm font-semibold text-slate-500 mb-3 block">หมวดหมู่</label>
                        <div class="grid grid-cols-3 gap-3" id="categoryOptions">
                            <!-- Injected by JS -->
                        </div>
                    </div>

                    <!-- Input Details -->
                    <div class="space-y-4">
                        <div>
                            <label class="text-sm font-semibold text-slate-500 mb-1.5 block">ชื่อรายการ / ชื่อพระ</label>
                            <input type="text" id="inputTitle" required
                                class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white transition-all"
                                placeholder="เช่น สมเด็จวัดระฆัง...">
                        </div>

                        <div>
                            <label class="text-sm font-semibold text-slate-500 mb-1.5 block">จำนวนเงิน (บาท)</label>
                            <input type="number" id="inputAmount" required min="0" step="0.01"
                                class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:bg-white transition-all text-xl font-bold"
                                placeholder="0">
                        </div>
                    </div>

                    <!-- Wallet Selection -->
                    <div>
                        <label class="text-sm font-semibold text-slate-500 mb-3 block">ชำระผ่าน (กระเป๋าเงิน)</label>
                        <div class="flex gap-3">
                            <button type="button" onclick="selectWallet('TRANSFER')" id="btnTransfer" class="flex-1 flex items-center justify-center gap-2 py-3.5 rounded-xl border-2 transition-all">
                                <i class="ph ph-bank text-xl"></i> เงินโอน
                            </button>
                            <button type="button" onclick="selectWallet('CASH')" id="btnCash" class="flex-1 flex items-center justify-center gap-2 py-3.5 rounded-xl border-2 transition-all">
                                <i class="ph ph-wallet text-xl"></i> เงินสด
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="btnSubmit" class="w-full bg-slate-900 text-white font-bold text-lg py-4 rounded-xl shadow-lg hover:bg-slate-800 active:scale-95 transition-all flex justify-center items-center gap-2 mt-4">
                        บันทึกรายการ
                    </button>
                </form>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 hidden zoom-in">
            <div class="bg-emerald-600 text-white px-5 py-3 rounded-full shadow-lg font-medium flex items-center gap-2">
                <i class="ph-fill ph-check-circle text-xl"></i>
                <span id="toastMsg">สำเร็จ</span>
            </div>
        </div>

    </div>

    <script>
        // --- Configuration & Constants ---
        const STORAGE_KEY = 'amulet_ledger_vanilla_v1';
        
        const CATEGORIES = {
            SELL: { id: 'SELL', label: 'ปล่อยเช่า (ขาย)', type: 'INCOME', icon: 'ph-trend-up', color: 'text-emerald-600', border: 'border-emerald-500', bg: 'bg-emerald-100' },
            BUY: { id: 'BUY', label: 'เช่าเข้า (ซื้อ)', type: 'EXPENSE', icon: 'ph-trend-down', color: 'text-rose-600', border: 'border-rose-500', bg: 'bg-rose-100' },
            CERT: { id: 'CERT', label: 'ค่าออกบัตร', type: 'EXPENSE', icon: 'ph-medal', color: 'text-amber-600', border: 'border-amber-500', bg: 'bg-amber-100' },
            OTHER_INCOME: { id: 'OTHER_INCOME', label: 'รายรับอื่น', type: 'INCOME', icon: 'ph-plus', color: 'text-blue-600', border: 'border-blue-500', bg: 'bg-blue-100' },
            OTHER_EXPENSE: { id: 'OTHER_EXPENSE', label: 'รายจ่ายอื่น', type: 'EXPENSE', icon: 'ph-tag', color: 'text-slate-600', border: 'border-slate-500', bg: 'bg-slate-100' }
        };

        // --- Application State ---
        let state = {
            transactions: JSON.parse(localStorage.getItem(STORAGE_KEY)) || [],
            selectedDate: new Date().toLocaleDateString('en-CA'), // Format YYYY-MM-DD local time
            formCategory: 'SELL',
            formWallet: 'TRANSFER',
            confirmDeleteId: null
        };

        // --- DOM Elements ---
        const els = {
            datePicker: document.getElementById('datePicker'),
            totalBalance: document.getElementById('totalBalance'),
            transferBalance: document.getElementById('transferBalance'),
            cashBalance: document.getElementById('cashBalance'),
            dailyIncome: document.getElementById('dailyIncome'),
            dailyExpense: document.getElementById('dailyExpense'),
            dailyCount: document.getElementById('dailyCount'),
            transactionList: document.getElementById('transactionList'),
            modal: document.getElementById('modalBackdrop'),
            addForm: document.getElementById('addForm'),
            categoryOptions: document.getElementById('categoryOptions'),
            btnTransfer: document.getElementById('btnTransfer'),
            btnCash: document.getElementById('btnCash'),
            inputTitle: document.getElementById('inputTitle'),
            inputAmount: document.getElementById('inputAmount'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toastMsg')
        };

        // --- Initialization ---
        function init() {
            els.datePicker.value = state.selectedDate;
            els.datePicker.addEventListener('change', (e) => {
                state.selectedDate = e.target.value;
                state.confirmDeleteId = null;
                render();
            });

            els.addForm.addEventListener('submit', handleFormSubmit);
            
            renderCategoryOptions();
            updateWalletButtons();
            render();
        }

        // --- Utility Functions ---
        function formatMoney(amount) {
            return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 0 }).format(amount) + ' ฿';
        }

        function showToast(msg) {
            els.toastMsg.innerText = msg;
            els.toast.classList.remove('hidden');
            setTimeout(() => els.toast.classList.add('hidden'), 3000);
        }

        // --- Form Interaction ---
        function toggleModal(show) {
            if (show) {
                els.modal.classList.remove('hidden');
                els.inputTitle.focus();
            } else {
                els.modal.classList.add('hidden');
                els.addForm.reset();
            }
        }

        function selectCategory(id) {
            state.formCategory = id;
            renderCategoryOptions();
        }

        function selectWallet(id) {
            state.formWallet = id;
            updateWalletButtons();
        }

        function renderCategoryOptions() {
            let html = '';
            for (const key in CATEGORIES) {
                const cat = CATEGORIES[key];
                const isSelected = state.formCategory === cat.id;
                
                const baseClasses = 'flex flex-col items-center justify-center p-3 rounded-2xl border-2 transition-all cursor-pointer';
                const selectedClasses = isSelected ? `${cat.border} ${cat.bg}` : 'border-slate-100 bg-white hover:bg-slate-50';
                const iconColor = isSelected ? cat.color : 'text-slate-400';
                const textColor = isSelected ? cat.color : 'text-slate-500';

                html += `
                    <button type="button" onclick="selectCategory('${cat.id}')" class="${baseClasses} ${selectedClasses}">
                        <i class="${cat.icon} text-2xl mb-1 ${iconColor}"></i>
                        <span class="text-xs font-medium ${textColor}">${cat.label}</span>
                    </button>
                `;
            }
            els.categoryOptions.innerHTML = html;
        }

        function updateWalletButtons() {
            const isTransfer = state.formWallet === 'TRANSFER';
            
            els.btnTransfer.className = `flex-1 flex items-center justify-center gap-2 py-3.5 rounded-xl border-2 transition-all ${isTransfer ? 'border-blue-500 bg-blue-50 text-blue-700 font-bold' : 'border-slate-100 text-slate-500'}`;
            els.btnCash.className = `flex-1 flex items-center justify-center gap-2 py-3.5 rounded-xl border-2 transition-all ${!isTransfer ? 'border-emerald-500 bg-emerald-50 text-emerald-700 font-bold' : 'border-slate-100 text-slate-500'}`;
        }

        // --- Data Handling ---
        function handleFormSubmit(e) {
            e.preventDefault();
            const title = els.inputTitle.value.trim();
            const amount = parseFloat(els.inputAmount.value);

            if (!title || isNaN(amount)) return;

            const newTx = {
                id: 'tx_' + Date.now() + '_' + Math.random().toString(36).substring(2,9),
                title: title,
                amount: amount,
                categoryId: state.formCategory,
                walletId: state.formWallet,
                date: state.selectedDate,
                timestamp: new Date().toISOString()
            };

            state.transactions.unshift(newTx);
            saveData();
            
            toggleModal(false);
            render();
            showToast('บันทึกข้อมูลสำเร็จ');
        }

        function promptDelete(id) {
            state.confirmDeleteId = id;
            render(); // Re-render to show confirm buttons
        }

        function cancelDelete() {
            state.confirmDeleteId = null;
            render();
        }

        function confirmDelete(id) {
            state.transactions = state.transactions.filter(tx => tx.id !== id);
            state.confirmDeleteId = null;
            saveData();
            render();
            showToast('ลบรายการสำเร็จ');
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.transactions));
        }

        // --- Render Engine ---
        function render() {
            let balanceCash = 0;
            let balanceTransfer = 0;
            let dailyIncome = 0;
            let dailyExpense = 0;
            
            const todayTxs = [];

            // Compute Analytics
            state.transactions.forEach(tx => {
                const cat = CATEGORIES[tx.categoryId] || CATEGORIES.OTHER_EXPENSE;
                const isIncome = cat.type === 'INCOME';
                
                // All-time balances
                if (tx.walletId === 'CASH') {
                    balanceCash += isIncome ? tx.amount : -tx.amount;
                } else {
                    balanceTransfer += isIncome ? tx.amount : -tx.amount;
                }

                // Daily logic
                if (tx.date === state.selectedDate) {
                    todayTxs.push(tx);
                    if (isIncome) dailyIncome += tx.amount;
                    else dailyExpense += tx.amount;
                }
            });

            // Update DOM Stats
            els.totalBalance.innerText = formatMoney(balanceCash + balanceTransfer);
            els.cashBalance.innerText = formatMoney(balanceCash);
            els.transferBalance.innerText = formatMoney(balanceTransfer);
            els.dailyIncome.innerText = formatMoney(dailyIncome);
            els.dailyExpense.innerText = formatMoney(dailyExpense);
            els.dailyCount.innerText = `${todayTxs.length} รายการ`;

            // Render List
            if (todayTxs.length === 0) {
                els.transactionList.innerHTML = `
                    <div class="text-center py-16 bg-white rounded-3xl border border-slate-100 border-dashed zoom-in">
                        <div class="bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="ph ph-receipt text-3xl text-slate-300"></i>
                        </div>
                        <p class="text-slate-500 font-medium">ยังไม่มีรายการในวันนี้</p>
                        <p class="text-slate-400 text-sm mt-1">กดปุ่ม + ด้านล่างเพื่อเริ่มบันทึก</p>
                    </div>
                `;
                return;
            }

            let listHTML = '';
            todayTxs.forEach(tx => {
                const cat = CATEGORIES[tx.categoryId] || CATEGORIES.OTHER_EXPENSE;
                const isIncome = cat.type === 'INCOME';
                const isConfirming = state.confirmDeleteId === tx.id;
                
                const walletIcon = tx.walletId === 'CASH' ? 'ph-wallet' : 'ph-bank';
                const walletLabel = tx.walletId === 'CASH' ? 'เงินสด' : 'โอน';

                let actionHTML = '';
                if (isConfirming) {
                    actionHTML = `
                        <div class="flex items-center gap-2 zoom-in">
                            <button onclick="cancelDelete()" class="text-xs font-medium text-slate-400 hover:text-slate-600 px-2 py-1">ยกเลิก</button>
                            <button onclick="confirmDelete('${tx.id}')" class="text-xs font-bold bg-rose-100 text-rose-600 hover:bg-rose-200 px-3 py-1.5 rounded-lg transition-colors">ยืนยันลบ</button>
                        </div>
                    `;
                } else {
                    actionHTML = `
                        <button onclick="promptDelete('${tx.id}')" class="text-xs text-slate-300 hover:text-rose-500 flex items-center gap-1 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                            <i class="ph ph-trash"></i> ลบ
                        </button>
                    `;
                }

                listHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between group fade-in">
                        <div class="flex items-center gap-4 flex-1 min-w-0">
                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 ${cat.bg} ${cat.color}">
                                <i class="${cat.icon} text-2xl"></i>
                            </div>
                            <div class="min-w-0 pr-2">
                                <p class="font-bold text-slate-800 mb-0.5 truncate">${tx.title}</p>
                                <div class="flex items-center gap-2 text-xs font-medium">
                                    <span class="${cat.color} whitespace-nowrap">${cat.label}</span>
                                    <span class="text-slate-300">•</span>
                                    <span class="text-slate-500 flex items-center gap-1 whitespace-nowrap">
                                        <i class="ph ${walletIcon}"></i> ${walletLabel}
                                    </span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex flex-col items-end gap-2 shrink-0">
                            <p class="font-bold text-lg ${isIncome ? 'text-emerald-600' : 'text-slate-800'}">
                                ${isIncome ? '+' : '-'}${formatMoney(tx.amount)}
                            </p>
                            ${actionHTML}
                        </div>
                    </div>
                `;
            });

            els.transactionList.innerHTML = listHTML;
        }

        // Boot up
        window.onload = init;
    </script>
</body>
</html>
